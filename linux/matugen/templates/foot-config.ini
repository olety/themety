[main]
shell=/usr/bin/fish
font=monospace:size=13
initial-color-theme={{ mode }}

[csd]
preferred=client
size=26
font=Space Mono:size=10
hide-when-maximized=no
border-width=1
<* if {{ is_dark_mode }} *>
color=ff393939
border-color=ff515151
button-minimize-color=ff6699cc
button-maximize-color=ff99cc99
button-close-color=fff2777a
<* else *>
color=ffeee8d5
border-color=ff93a1a1
button-minimize-color=ff268bd2
button-maximize-color=ff859900
button-close-color=ffdc322f
<* endif *>

[colors-dark]
background=2d2d2d
foreground=cccccc
selection-foreground=ffffff
selection-background={{ colors.primary.dark.hex_stripped }}
regular0=2d2d2d
regular1=f2777a
regular2=99cc99
regular3=ffcc66
regular4=6699cc
regular5=cc99cc
regular6=66cccc
regular7=cccccc
bright0=999999
bright1=f2777a
bright2=99cc99
bright3=ffcc66
bright4=6699cc
bright5=cc99cc
bright6=66cccc
bright7=ffffff

[colors-light]
background=fdf6e3
foreground=657b83
selection-foreground=ffffff
selection-background={{ colors.primary.light.hex_stripped }}
regular0=073642
regular1=dc322f
regular2=859900
regular3=b58900
regular4=268bd2
regular5=d33682
regular6=2aa198
regular7=eee8d5
bright0=002b36
bright1=cb4b16
bright2=586e75
bright3=657b83
bright4=839496
bright5=6c71c4
bright6=93a1a1
bright7=fdf6e3
