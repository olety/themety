[main]
font=Space Mono:size=13
prompt="  > "
width=40
horizontal-pad=16
vertical-pad=8
inner-pad=4
border-width=1
border-radius=0
line-height=20
letter-spacing=0.5
layer=overlay

<* if {{ is_dark_mode }} *>
[colors]
background=393939ff
text=ccccccb3
match=ccccccff
selection=6699ccff
selection-text=2d2d2dff
border=6699ccff
<* else *>
[colors]
background=eee8d5ff
text=657b83b3
match=657b83ff
selection=268bd2ff
selection-text=fdf6e3ff
border=268bd2ff
<* endif *>
