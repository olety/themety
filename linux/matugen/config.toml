[config]
version_check = false
contrast = 0.0
prefer = "saturation"

[config.wallpaper]
set = true
command = "awww img --transition-type center --transition-step 90 --transition-fps 60 {{ image }}"

[templates.waybar-colors]
input_path = "~/.config/matugen/templates/waybar-colors.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar 2>/dev/null || true"

[templates.mako-config]
input_path = "~/.config/matugen/templates/mako-config"
output_path = "~/.config/mako/config"
post_hook = "makoctl reload 2>/dev/null || true"

[templates.foot-config]
input_path = "~/.config/matugen/templates/foot-config.ini"
output_path = "~/.config/foot/foot.ini"
post_hook = "~/.local/bin/reload-foot"

[templates.niri-colors]
input_path = "~/.config/matugen/templates/niri-colors.sh"
output_path = "~/.local/state/niri-colors.sh"
post_hook = "~/.local/bin/patch-niri-colors"

[templates.eww-colors]
input_path = "~/.config/matugen/templates/eww-colors.scss"
output_path = "~/.config/eww/colors.scss"
post_hook = "eww reload 2>/dev/null || true"

[templates.fuzzel-config]
input_path = "~/.config/matugen/templates/fuzzel-config.ini"
output_path = "~/.config/fuzzel/fuzzel.ini"

[templates.theme-colors]
input_path = "~/.config/matugen/templates/theme-colors.json"
output_path = "~/.local/state/theme-colors.json"
